<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒计时 - 2027年3月1日</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
        }

        .title {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #86868b;
            margin-bottom: 16px;
        }

        .target-date {
            font-size: 18px;
            font-weight: 400;
            color: #f5f5f7;
            margin-bottom: 60px;
            letter-spacing: 0.5px;
        }

        .countdown {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
        }

        .countdown-value {
            font-size: 80px;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
            background: linear-gradient(180deg, #ffffff 0%, #86868b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .countdown-label {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #86868b;
            margin-top: 12px;
        }

        .separator {
            font-size: 60px;
            font-weight: 300;
            color: #333;
            line-height: 1;
            padding-bottom: 30px;
        }

        .progress-section {
            margin-top: 80px;
            padding: 0 40px;
        }

        .progress-bar-container {
            width: 100%;
            max-width: 500px;
            height: 4px;
            background: #1d1d1f;
            border-radius: 2px;
            margin: 0 auto 16px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #333, #fff);
            border-radius: 2px;
            transition: width 1s ease;
        }

        .progress-text {
            font-size: 14px;
            color: #86868b;
            font-weight: 400;
        }

        .current-time {
            margin-top: 60px;
            font-size: 14px;
            color: #48484a;
            font-weight: 400;
        }

        @media (max-width: 600px) {
            .countdown-value {
                font-size: 48px;
                letter-spacing: -1px;
            }

            .separator {
                font-size: 36px;
                padding-bottom: 20px;
            }

            .countdown-item {
                min-width: 70px;
            }

            .progress-section {
                padding: 0 20px;
            }
        }

        @media (max-width: 400px) {
            .countdown {
                gap: 4px;
            }

            .countdown-value {
                font-size: 36px;
            }

            .countdown-item {
                min-width: 60px;
            }

            .separator {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">倒计时</div>
        <div class="target-date">2027 年 3 月 1 日</div>

        <div class="countdown">
            <div class="countdown-item">
                <div class="countdown-value" id="days">000</div>
                <div class="countdown-label">天</div>
            </div>
            <div class="separator">:</div>
            <div class="countdown-item">
                <div class="countdown-value" id="hours">00</div>
                <div class="countdown-label">时</div>
            </div>
            <div class="separator">:</div>
            <div class="countdown-item">
                <div class="countdown-value" id="minutes">00</div>
                <div class="countdown-label">分</div>
            </div>
            <div class="separator">:</div>
            <div class="countdown-item">
                <div class="countdown-value" id="seconds">00</div>
                <div class="countdown-label">秒</div>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">0% 已过去</div>
        </div>

        <div class="current-time" id="currentTime"></div>
    </div>

    <script>
        const targetDate = new Date('2027-03-01T00:00:00');
        const startDate = new Date('2024-01-01T00:00:00');

        function padZero(num) {
            return String(num).padStart(2, '0');
        }

        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('days').textContent = '000';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                document.getElementById('progressBar').style.width = '100%';
                document.getElementById('progressText').textContent = '100% 已到达';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(3, '0');
            document.getElementById('hours').textContent = padZero(hours);
            document.getElementById('minutes').textContent = padZero(minutes);
            document.getElementById('seconds').textContent = padZero(seconds);

            // Update progress
            const totalSpan = targetDate - startDate;
            const elapsed = now - startDate;
            const progress = Math.min((elapsed / totalSpan) * 100, 100);
            document.getElementById('progressBar').style.width = progress.toFixed(2) + '%';
            document.getElementById('progressText').textContent = progress.toFixed(1) + '% 已过去';

            // Update current time
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            document.getElementById('currentTime').textContent = '当前时间：' + timeStr;
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
