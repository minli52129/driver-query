<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>司机数据查询系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: white;
      margin-bottom: 8px;
      font-size: 28px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    .stats {
      text-align: center;
      color: rgba(255,255,255,0.85);
      margin-bottom: 24px;
      font-size: 14px;
    }
    .search-box {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }
    .search-row {
      display: flex;
      gap: 12px;
    }
    input {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #667eea; }
    button {
      padding: 14px 28px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      white-space: nowrap;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
    button:active { transform: translateY(0); }
    .result-count {
      color: #718096;
      font-size: 14px;
      margin-top: 12px;
    }
    .results {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .no-results {
      padding: 60px 20px;
      text-align: center;
      color: #a0aec0;
      font-size: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #f7fafc;
      padding: 14px 16px;
      text-align: left;
      font-weight: 600;
      color: #4a5568;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #e2e8f0;
      position: sticky;
      top: 0;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #edf2f7;
      color: #2d3748;
      font-size: 14px;
    }
    tr:hover td { background: #f7fafc; }
    tr:last-child td { border-bottom: none; }
    .phone { font-family: 'SF Mono', Monaco, monospace; color: #667eea; font-weight: 500; }
    .plate { font-family: 'SF Mono', Monaco, monospace; }
    .empty { color: #cbd5e0; font-style: italic; }
    .copy-btn {
      padding: 6px 14px;
      background: #edf2f7;
      color: #4a5568;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .copy-btn:hover { background: #667eea; color: white; box-shadow: none; transform: none; }
    .copy-btn.copied { background: #48bb78; color: white; }
    .scroll-wrapper {
      max-height: 70vh;
      overflow-y: auto;
    }
    @media (max-width: 768px) {
      .search-row { flex-direction: column; }
      table { font-size: 13px; }
      td, th { padding: 10px 8px; }
      h1 { font-size: 22px; }
      .scroll-wrapper { max-height: 60vh; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>司机数据查询系统</h1>
    <p class="stats" id="stats"></p>
    <div class="search-box">
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="输入司机姓名查询..." autofocus>
        <button onclick="search()">查询</button>
        <button onclick="clearSearch()" style="background: #e2e8f0; color: #4a5568;">重置</button>
      </div>
      <div class="result-count" id="resultCount"></div>
    </div>
    <div class="results">
      <div class="scroll-wrapper">
        <table id="resultTable" style="display:none;">
          <thead>
            <tr>
              <th>姓名</th>
              <th>车型</th>
              <th>电话</th>
              <th>备用电话</th>
              <th>车牌号</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
        <div class="no-results" id="noResults">
          输入姓名开始查询
        </div>
      </div>
    </div>
  </div>

  <script>
    let drivers = [];

    fetch('drivers_db.json')
      .then(r => r.json())
      .then(data => {
        drivers = data;
        document.getElementById('stats').textContent =
          `共 ${drivers.length} 条司机记录`;
        showAll();
      })
      .catch(err => {
        document.getElementById('noResults').textContent = '数据加载失败';
      });

    function showAll() {
      renderResults(drivers);
    }

    function search() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) { showAll(); return; }
      const matches = drivers.filter(d => d.name.includes(q));
      renderResults(matches, q);
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      showAll();
    }

    function renderResults(list, query) {
      const tbody = document.getElementById('resultBody');
      const table = document.getElementById('resultTable');
      const noResults = document.getElementById('noResults');
      const countEl = document.getElementById('resultCount');

      if (list.length === 0) {
        table.style.display = 'none';
        noResults.style.display = 'block';
        noResults.textContent = `未找到"${query}"相关司机`;
        countEl.textContent = '';
        return;
      }

      noResults.style.display = 'none';
      table.style.display = 'table';
      countEl.textContent = query ? `找到 ${list.length} 条匹配记录` : '';

      tbody.innerHTML = list.map(d => `
        <tr>
          <td><strong>${esc(d.name)}</strong></td>
          <td>${esc(d.car) || '<span class="empty">-</span>'}</td>
          <td class="phone">${esc(d.phone)}</td>
          <td class="phone">${d.backup_phone ? esc(d.backup_phone) : '<span class="empty">-</span>'}</td>
          <td class="plate">${esc(d.plate) || '<span class="empty">-</span>'}</td>
          <td><button class="copy-btn" onclick="copyRow(this, ${JSON.stringify(d).replace(/"/g, '&quot;')})">复制</button></td>
        </tr>
      `).join('');
    }

    function esc(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function copyRow(btn, d) {
      const lines = [
        `姓名：${d.name}`,
        `车型：${d.car || '-'}`,
        `电话：${d.phone}`,
        d.backup_phone ? `备用电话：${d.backup_phone}` : null,
        `车牌号：${d.plate || '-'}`,
      ].filter(Boolean);
      const text = lines.join('\n');
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '已复制';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
      });
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') search();
    });
  </script>
</body>
</html>
