    ];

    const STORAGE_KEY = 'dp_visited_orders_v2';
    const container = document.getElementById('list-container');
    const counter = document.getElementById('counter');
    
    // 从 LocalStorage 读取已检查的订单集合
    let visitedOrders = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));

    function updateCounter() {
        counter.innerText = `已检查: ${visitedOrders.size} / ${urls.length}`;
    }

    // 渲染网页列表
    urls.forEach((url, index) => {
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.className = 'link-item';
        
        const orderNo = url.match(/orderNo=([^&]+)/)?.[1] || `订单 ${index + 1}`;
        a.dataset.orderNo = orderNo; // 存入节点方便管理

        // 如果该订单已被记录，初始化时直接设为已检查状态
        if (visitedOrders.has(orderNo)) {
            a.className = 'link-item visited';
            a.innerHTML = `
                <span>序号 ${String(index + 1).padStart(3, '0')} &nbsp;|&nbsp; 订单号: <b>${orderNo}</b></span>
                <span class="badge badge-visited" id="badge-${index}">已点开</span>
            `;
        } else {
            a.innerHTML = `
                <span>序号 ${String(index + 1).padStart(3, '0')} &nbsp;|&nbsp; 订单号: <b>${orderNo}</b></span>
                <span class="badge badge-new" id="badge-${index}">待检查</span>
            `;
        }

        a.onclick = function() {
            if (!this.classList.contains('visited')) {
                this.classList.add('visited');
                visitedOrders.add(orderNo);
                
                // 同步存储到本地
                localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(visitedOrders)));
                updateCounter();
                
                const badge = document.getElementById(`badge-${index}`);
                badge.className = 'badge badge-visited';
                badge.innerText = '已点开';
            }
        };

        container.appendChild(a);
    });

    // 清空进度的函数
    function resetProgress() {
        if (confirm('确定要清空所有已点击的记录，重新核对吗？')) {
            localStorage.removeItem(STORAGE_KEY);
            visitedOrders.clear();
            location.reload(); // 刷新页面重置UI
        }
    }

    updateCounter();
</script>
